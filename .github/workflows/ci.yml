name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck SDK
        run: pnpm --filter @hoppper/sdk exec tsc --noEmit

      - name: Test SDK
        run: pnpm --filter @hoppper/sdk test

      - name: Build SDK
        run: pnpm --filter @hoppper/sdk build

      - name: Typecheck app
        run: pnpm --filter @hoppper/app exec vue-tsc --noEmit
