[package]
name = "hoppper-app"
version = "0.0.0"
edition = "2021"

[lib]
name = "hoppper_app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
# `unsafe-headers` lets the SDK set the Cookie header used for Endlesss's
# load-balancer pinning (LORE convention: `Cookie: LB=liveNN`). Tauri drops
# it by default because fetch-spec treats Cookie as a forbidden header.
tauri-plugin-http = { version = "2", features = ["unsafe-headers"] }
tauri-plugin-fs = "2"
tauri-plugin-stronghold = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Our own reqwest client for Endlesss calls — tauri-plugin-http's reqwest
# negotiates HTTP/2 by default and Endlesss's Cloudflare front-end returns
# 500 on the resulting fingerprint (curl/undici over HTTP/1.1 succeed
# against the same endpoint). We pin HTTP/1.1 in our client to bypass it.
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "http2"] }
base64 = "0.22"
