<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hoppper</title>
    <style>
      /* Bootstrap splash. Visible from page load until Vue mounts —
         Stronghold can take 30–60s to open the vault on cold start. */
      .boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        font-family: system-ui, sans-serif;
        color: #444;
        background: #fafafa;
      }
      .boot-splash h1 {
        margin: 0;
        font-size: 1.25rem;
        letter-spacing: 0.02em;
      }
      .boot-splash .spinner {
        width: 1.5rem;
        height: 1.5rem;
        border: 3px solid #ddd;
        border-top-color: #555;
        border-radius: 50%;
        animation: boot-spin 0.8s linear infinite;
      }
      .boot-splash .hint {
        font-size: 0.8125rem;
        color: #888;
      }
      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="boot-splash" data-test="boot-splash">
        <h1>Hoppper</h1>
        <div class="spinner" aria-hidden="true"></div>
        <p class="hint">Opening session vault…</p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
